spring:
  # 기본 프로필: local (application-local.yml의 민감 정보를 자동 로드)
  profiles:
    active: local

  # 애플리케이션 이름
  application:
    name: sync

  # MariaDB 연결 설정
  datasource:
    url: jdbc:mariadb://192.168.10.129:3306/smartlog?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver

  # JPA/Hibernate 설정
  jpa:
    hibernate:
      ddl-auto: update        # Entity 변경 시 테이블 자동 반영 (운영 환경에서는 validate 권장)
    show-sql: true             # 콘솔에 SQL 출력
    properties:
      hibernate:
        format_sql: true       # SQL 포맷팅 (가독성 향상)

  # MongoDB 연결 설정 (Spring Boot 4.0부터 spring.mongodb.* 로 이동, spring.data.mongodb.* 는 Spring Data 전용)
  mongodb:
    uri: ${MONGODB_URI}

  # Thymeleaf 템플릿 엔진 설정
  thymeleaf:
    cache: false               # 캐시 비활성화 (개발 중 템플릿 즉시 반영)
    encoding: UTF-8

  # Gmail SMTP 설정 (이메일 인증코드 발송)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false


# Gemini API 설정
gemini:
  api-key: ${GEMINI_API_KEY}
  model: gemini-2.5-flash

# 날씨 API 설정 (기상청 단기예보 - 공공데이터포털)
weather:
  api-key: ${WEATHER_API_KEY:}

# 서버 포트 + 세션 쿠키 보안 설정
server:
  port: 8080
  servlet:
    session:
      timeout: 30m              # 30분 미사용 시 세션 자동 만료
      cookie:
        name: SYNC_SESSION
        http-only: true         # JS에서 쿠키 접근 차단 (XSS 방어)
        same-site: lax          # CSRF 방어 — 외부 사이트 요청 시 쿠키 미전송
        secure: ${SESSION_COOKIE_SECURE:false}  # 운영(HTTPS) 환경에서 true로 설정