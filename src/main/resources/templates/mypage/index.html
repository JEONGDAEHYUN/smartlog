<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - SmartLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<nav th:replace="~{fragments/topbar :: topbar}"></nav>

<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar('mypage')}"></div>

    <div class="flex-grow-1" style="min-height: calc(100vh - 42px); background: #f4f6f8;">
        <div class="bg-white border-bottom px-4 py-2 small text-muted">
            <span>홈</span> <span class="mx-1">▶</span>
            <span class="fw-bold" style="color:var(--n6);">마이페이지</span>
        </div>

        <div class="p-4">

            <!-- 프로필 헤더 카드 -->
            <div class="card border mb-3">
                <div class="card-body d-flex align-items-center gap-4 p-4">
                    <div class="avatar-big" th:text="${#strings.substring(user.userName, 0, 1)}">정</div>
                    <div class="flex-grow-1">
                        <div class="fs-5 fw-bold" th:text="${user.userName}">이름</div>
                        <div class="text-muted small mb-2" th:text="${user.userEmail + ' · ' + user.orgName}">이메일 · 조직</div>
                        <div class="d-flex align-items-center gap-2">
                            <span class="badge d-flex align-items-center gap-1" style="background:#eef7ff; color:var(--n6); border:1px solid #b8d8f8; font-size:12px; padding:4px 12px;">
                                <span th:text="${user.userRole}">ROLE_USER</span>
                            </span>
                            <span class="badge bg-success-subtle text-success">계정 정상</span>
                        </div>
                    </div>
                    <div class="text-end text-muted small">
                        가입일: <span th:text="${#temporals.format(user.regDt, 'yyyy-MM-dd')}">날짜</span>
                    </div>
                </div>
            </div>

            <!-- 알림 메시지 -->
            <div th:if="${success}" class="alert alert-success small py-2" th:text="${success}"></div>

            <!-- 탭 -->
            <ul class="nav tab-pill p-1 mb-3" style="background:#f0f4f8; border-radius:7px; width:fit-content;" role="tablist">
                <li class="nav-item">
                    <a class="nav-link" id="tab-profile" data-bs-toggle="tab" href="#panel-profile" role="tab"
                       th:classappend="${activeTab != 'password'} ? ' active'">개인 정보</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" id="tab-password" data-bs-toggle="tab" href="#panel-password" role="tab"
                       th:classappend="${activeTab == 'password'} ? ' active'">비밀번호 변경</a>
                </li>
            </ul>

            <div class="tab-content">
                <!-- 탭1: 개인 정보 -->
                <div class="tab-pane fade" id="panel-profile" role="tabpanel"
                     th:classappend="${activeTab != 'password'} ? ' show active'">
                    <div class="card border" style="max-width:500px;">
                        <div class="card-body p-4">
                            <div class="d-flex align-items-center gap-2 mb-3">
                                <div class="sec-bar"></div>
                                <span class="fw-bold small">기본 정보 수정</span>
                            </div>
                            <form th:action="@{/mypage/profile}" method="post">
                                <div class="mb-3">
                                    <label for="userName" class="form-label small fw-semibold">이름 <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="userName" name="userName"
                                           th:value="${user.userName}" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small fw-semibold">이메일</label>
                                    <input type="email" class="form-control" th:value="${user.userEmail}" disabled>
                                    <div class="text-muted small mt-1">이메일은 변경할 수 없습니다</div>
                                </div>
                                <div class="mb-3">
                                    <label for="orgName" class="form-label small fw-semibold">조직명 <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="orgName" name="orgName"
                                           th:value="${user.orgName}" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small fw-semibold">권한</label>
                                    <div>
                                        <span class="badge" style="background:#eef7ff; color:var(--n6); border:1px solid #b8d8f8; font-size:12px; padding:6px 14px;"
                                              th:text="${user.userRole}">ROLE_USER</span>
                                    </div>
                                </div>
                                <button type="submit" class="btn w-100 text-white fw-bold" style="background:#1a7a4a;">정보 저장</button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- 탭2: 비밀번호 변경 -->
                <div class="tab-pane fade" id="panel-password" role="tabpanel"
                     th:classappend="${activeTab == 'password'} ? ' show active'">
                    <div class="card border" style="max-width:480px;">
                        <div class="card-body p-4">
                            <div class="d-flex align-items-center gap-2 mb-3">
                                <div class="sec-bar"></div>
                                <span class="fw-bold small">비밀번호 변경</span>
                            </div>

                            <div th:if="${pwError}" class="alert alert-danger small py-2" th:text="${pwError}"></div>

                            <form th:action="@{/mypage/password}" method="post">
                                <div class="mb-3">
                                    <label for="currentPassword" class="form-label small fw-semibold">
                                        현재 비밀번호 <span class="text-danger">*</span>
                                    </label>
                                    <input type="password" class="form-control" id="currentPassword"
                                           name="currentPassword" placeholder="현재 비밀번호 입력" required>
                                </div>
                                <div class="mb-3">
                                    <label for="newPassword" class="form-label small fw-semibold">
                                        새 비밀번호 <span class="text-danger">*</span>
                                    </label>
                                    <input type="password" class="form-control" id="newPassword"
                                           name="newPassword" placeholder="8자 이상" required minlength="8">
                                </div>
                                <div class="mb-3">
                                    <label for="confirmPassword" class="form-label small fw-semibold">
                                        새 비밀번호 확인 <span class="text-danger">*</span>
                                    </label>
                                    <input type="password" class="form-control" id="confirmPassword"
                                           name="confirmPassword" placeholder="비밀번호 재입력" required>
                                </div>
                                <div class="alert alert-warning small py-2 mb-3">
                                    비밀번호 변경 후 다시 로그인해주세요.
                                </div>
                                <button type="submit" class="btn w-100 text-white fw-bold" style="background:#1a7a4a;">비밀번호 변경</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
