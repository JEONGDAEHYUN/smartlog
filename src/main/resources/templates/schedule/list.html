<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 일정 - SmartLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<!-- 탑바 -->
<nav th:replace="~{fragments/topbar :: topbar}"></nav>

<div class="d-flex">
    <!-- 사이드바 -->
    <div th:replace="~{fragments/sidebar :: sidebar('schedule-list')}"></div>

    <!-- 메인 콘텐츠 -->
    <div class="flex-grow-1" style="min-height: calc(100vh - 42px); background: #f4f6f8;">
        <div class="bg-white border-bottom px-4 py-2 small text-muted">
            <span>홈</span> <span class="mx-1">▶</span>
            <span>스마트 일정</span> <span class="mx-1">▶</span>
            <span class="fw-bold" style="color:var(--n6);">일정 목록</span>
        </div>

        <div class="p-4">

            <!-- KPI 통계 -->
            <div class="row g-3 mb-4">
                <div class="col-6 col-xl">
                    <div class="card border position-relative overflow-hidden">
                        <div class="kpi-line" style="background:var(--n6);"></div>
                        <div class="card-body py-2 ps-4">
                            <div class="fs-4 fw-bold" th:text="${totalCount}">0</div>
                            <div class="text-muted small">전체 일정</div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-xl">
                    <div class="card border position-relative overflow-hidden">
                        <div class="kpi-line" style="background:#c0392b;"></div>
                        <div class="card-body py-2 ps-4">
                            <div class="fs-4 fw-bold" th:text="${highCount}">0</div>
                            <div class="text-muted small">HIGH 긴급</div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-xl">
                    <div class="card border position-relative overflow-hidden">
                        <div class="kpi-line" style="background:#b7770d;"></div>
                        <div class="card-body py-2 ps-4">
                            <div class="fs-4 fw-bold" th:text="${midCount}">0</div>
                            <div class="text-muted small">MID 보통</div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-xl">
                    <div class="card border position-relative overflow-hidden">
                        <div class="kpi-line" style="background:#1a7a4a;"></div>
                        <div class="card-body py-2 ps-4">
                            <div class="fs-4 fw-bold" th:text="${lowCount}">0</div>
                            <div class="text-muted small">LOW 낮음</div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-xl">
                    <div class="card border position-relative overflow-hidden">
                        <div class="kpi-line" style="background:#8a9bb0;"></div>
                        <div class="card-body py-2 ps-4">
                            <div class="fs-4 fw-bold" th:text="${doneCount}">0</div>
                            <div class="text-muted small">DONE 완료</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 일정 목록 -->
            <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
                <div class="d-flex align-items-center gap-2">
                    <div class="sec-bar"></div>
                    <span class="fw-bold small">일정 상세 목록</span>
                    <span class="badge bg-secondary-subtle text-secondary small ms-2"
                          id="listVisibleCount">0건</span>
                </div>
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-sm btn-outline-danger" onclick="deleteSelectedList()">선택 삭제</button>
                    <a th:href="@{/schedule/create}" class="btn btn-sm text-white" style="background:var(--n6);">일정 등록</a>
                </div>
            </div>

            <!-- 검색 + 기간 필터 -->
            <div class="card border mb-3">
                <div class="card-body p-3 d-flex flex-wrap gap-2 align-items-end">
                    <div class="flex-grow-1" style="min-width:180px;">
                        <label class="form-label small text-muted mb-1">제목 검색</label>
                        <input type="text" class="form-control form-control-sm"
                               placeholder="일정 제목으로 검색..." id="listSearchInput">
                    </div>
                    <div>
                        <label class="form-label small text-muted mb-1">시작일 (이상)</label>
                        <input type="date" class="form-control form-control-sm" id="listStartDate">
                    </div>
                    <div>
                        <label class="form-label small text-muted mb-1">종료일 (이하)</label>
                        <input type="date" class="form-control form-control-sm" id="listEndDate">
                    </div>
                    <button type="button" class="btn btn-sm btn-outline-secondary"
                            onclick="resetListFilter()">초기화</button>
                </div>
            </div>

            <div class="card border">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 small">
                        <thead class="table-light">
                            <tr>
                                <th style="width:34px;"><input type="checkbox" id="checkAllList" onclick="toggleAllList(this)" title="전체 선택"></th>
                                <th>일정 제목</th>
                                <th>시작 일시</th>
                                <th>종료 일시</th>
                                <th>우선순위</th>
                                <th>상태</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody id="listTbody">
                            <tr th:if="${#lists.isEmpty(schedules)}">
                                <td colspan="7" class="text-center text-muted py-4">등록된 일정이 없습니다.</td>
                            </tr>
                            <tr th:each="sch : ${schedules}" class="list-row"
                                th:data-title="${sch.schTitle}"
                                th:data-startdt="${#temporals.format(sch.startDt, 'yyyy-MM-dd')}">
                                <td><input type="checkbox" class="list-check" th:value="${sch.schId}" th:attr="data-recurring=${sch.recurring != null}"></td>
                                <td class="fw-semibold" th:classappend="${sch.status == 'DONE'} ? 'text-decoration-line-through text-muted'" th:text="${sch.schTitle}">제목</td>
                                <td class="text-muted" th:text="${#temporals.format(sch.startDt, 'MM/dd HH:mm')}">날짜</td>
                                <td class="text-muted" th:text="${sch.endDt != null ? #temporals.format(sch.endDt, 'MM/dd HH:mm') : '-'}">날짜</td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${sch.priority == 'HIGH'} ? 'bg-danger-subtle text-danger' : (${sch.priority == 'MID'} ? 'bg-warning-subtle text-warning' : 'bg-success-subtle text-success')"
                                          th:text="${sch.priority}">MID</span>
                                </td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${sch.status == 'DONE'} ? 'bg-secondary-subtle text-secondary' : (${sch.status == 'IN_PROGRESS'} ? 'bg-warning-subtle text-warning' : 'bg-info-subtle text-info')"
                                          th:text="${sch.status}">PLANNED</span>
                                </td>
                                <td>
                                    <div class="d-flex gap-1">
                                        <a th:href="@{/schedule/edit/{id}(id=${sch.schId})}"
                                           class="btn btn-sm py-0 px-2" style="font-size:11px; background:var(--n6); color:#fff;">수정</a>
                                        <form th:action="@{/schedule/delete/{id}(id=${sch.schId})}" method="post"
                                              onsubmit="return confirm('정말 삭제하시겠습니까?');">
                                            <button type="submit" class="btn btn-sm btn-outline-danger py-0 px-2"
                                                    style="font-size:11px;">삭제</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 페이지네이션 -->
            <nav class="d-flex justify-content-center mt-3">
                <ul class="pagination pagination-sm mb-0" id="listPagination"></ul>
            </nav>

            <!-- 범례 -->
            <div class="d-flex align-items-center gap-3 mt-3 p-2 bg-white border rounded small text-muted">
                <strong class="text-dark">범례:</strong>
                <span><span class="d-inline-block me-1" style="width:10px;height:10px;background:#fdf2f2;border-left:2px solid #c0392b;"></span>높음</span>
                <span><span class="d-inline-block me-1" style="width:10px;height:10px;background:#fffbeb;border-left:2px solid #b7770d;"></span>보통</span>
                <span><span class="d-inline-block me-1" style="width:10px;height:10px;background:#f0fdf4;border-left:2px solid #1a7a4a;"></span>낮음</span>
                <span><span class="d-inline-block me-1" style="width:10px;height:10px;background:#f4f6f8;border-left:2px solid #d0d8e0;"></span>완료</span>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // 검색 + 기간 필터 + 페이지네이션 (클라이언트 사이드 — 페이지당 10개)
    const PAGE_SIZE = 10;
    let currentPage = 1;
    const allRows = Array.from(document.querySelectorAll('#listTbody .list-row'));
    const searchInput = document.getElementById('listSearchInput');
    const startDateInput = document.getElementById('listStartDate');
    const endDateInput = document.getElementById('listEndDate');
    const pagination = document.getElementById('listPagination');
    const countBadge = document.getElementById('listVisibleCount');

    function getFiltered() {
        const keyword = (searchInput.value || '').trim().toLowerCase();
        const startDate = startDateInput.value || '';
        const endDate = endDateInput.value || '';
        return allRows.filter(row => {
            const title = (row.dataset.title || '').toLowerCase();
            const startDt = row.dataset.startdt || '';
            return (keyword === '' || title.includes(keyword))
                && (startDate === '' || startDt >= startDate)
                && (endDate === '' || startDt <= endDate);
        });
    }

    function resetListFilter() {
        searchInput.value = '';
        startDateInput.value = '';
        endDateInput.value = '';
        currentPage = 1;
        render();
    }

    function render() {
        const filtered = getFiltered();
        const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
        if (currentPage > totalPages) currentPage = totalPages;

        // 모든 row 숨김 → 현재 페이지 row 만 표시
        allRows.forEach(r => r.style.display = 'none');
        const start = (currentPage - 1) * PAGE_SIZE;
        filtered.slice(start, start + PAGE_SIZE).forEach(r => r.style.display = '');

        // 카운트
        if (countBadge) countBadge.textContent = filtered.length + '건';

        // 페이지 번호 버튼
        let html = '';
        html += '<li class="page-item ' + (currentPage === 1 ? 'disabled' : '') + '"><a class="page-link" href="#" data-page="' + (currentPage - 1) + '">이전</a></li>';
        for (let i = 1; i <= totalPages; i++) {
            html += '<li class="page-item ' + (i === currentPage ? 'active' : '') + '"><a class="page-link" href="#" data-page="' + i + '">' + i + '</a></li>';
        }
        html += '<li class="page-item ' + (currentPage === totalPages ? 'disabled' : '') + '"><a class="page-link" href="#" data-page="' + (currentPage + 1) + '">다음</a></li>';
        pagination.innerHTML = html;

        // 페이지 클릭 핸들러
        pagination.querySelectorAll('a.page-link').forEach(a => {
            a.addEventListener('click', (e) => {
                e.preventDefault();
                const page = parseInt(a.dataset.page);
                if (page >= 1 && page <= totalPages) {
                    currentPage = page;
                    render();
                }
            });
        });
    }

    if (searchInput) searchInput.addEventListener('keyup', () => { currentPage = 1; render(); });
    if (startDateInput) startDateInput.addEventListener('change', () => { currentPage = 1; render(); });
    if (endDateInput) endDateInput.addEventListener('change', () => { currentPage = 1; render(); });
    render();

    // ── 체크박스 다중 삭제 ──
    // 전체 선택/해제
    function toggleAllList(src) {
        document.querySelectorAll('.list-check').forEach(c => { c.checked = src.checked; });
    }
    window.toggleAllList = toggleAllList;

    // 선택 삭제 — 체크된 일정 일괄 삭제 (CSRF 예외 경로 /schedule/api/**)
    async function deleteSelectedList() {
        const checks = Array.from(document.querySelectorAll('.list-check:checked'));
        if (checks.length === 0) { alert('삭제할 일정을 선택하세요.'); return; }
        const ids = [...new Set(checks.map(c => c.value))];
        const hasRecurring = checks.some(c => c.dataset.recurring === 'true');
        let msg = '선택한 ' + ids.length + '개 일정을 삭제하시겠습니까?';
        if (hasRecurring) msg += '\n\n⚠ 반복 일정은 모든 회차가 함께 삭제됩니다.';
        if (!confirm(msg)) return;

        const fd = new FormData();
        ids.forEach(id => fd.append('schIds', id));
        try {
            const res = await fetch('/schedule/api/delete', { method: 'POST', body: fd });
            const data = await res.json();
            if (data.success) { location.reload(); }
            else { alert('삭제 실패: ' + (data.error || '알 수 없는 오류')); }
        } catch (e) { alert('삭제 실패: ' + e.message); }
    }
    window.deleteSelectedList = deleteSelectedList;
</script>
</body>
</html>
