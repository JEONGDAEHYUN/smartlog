<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>월간 캘린더 - SmartLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        /* Calendar grid (page-specific) */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); border: 1px solid #d0d8e0; border-radius: 8px; overflow: hidden; }
        .cal-hd { background: #f0f4f8; padding: 8px; text-align: center; font-size: 11px; font-weight: 600; color: #5a6a7a; border-bottom: 1px solid #d0d8e0; }
        .cal-hd.sun { color: #c0392b; }
        .cal-hd.sat { color: #2d6ca8; }
        .cal-cell { min-height: 90px; padding: 6px; border-bottom: 1px solid #e8ecf0; border-right: 1px solid #e8ecf0; background: #fff; cursor: pointer; }
        .cal-cell:hover { background: #f8fafc; }
        .cal-cell.other { background: #fafbfc; color: #c0c8d0; }
        .cal-cell.today { background: #eef7ff; }
        .cal-cell.selected { background: #dbeafe; outline: 2px solid #2d6ca8; outline-offset: -2px; }
        .cal-event-more { font-size: 10px; color: #2d6ca8; cursor: pointer; padding: 1px 5px; font-weight: 600; }
        .cal-event-more:hover { text-decoration: underline; }
        .cal-day { font-size: 11px; font-weight: 600; margin-bottom: 4px; }
        .cal-event { font-size: 10px; padding: 2px 5px; border-radius: 3px; margin-bottom: 2px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; cursor: pointer; }
        .cal-event.HIGH { background: #fdf2f2; color: #c0392b; border-left: 2px solid #c0392b; }
        .cal-event.MID { background: #fffbeb; color: #b7770d; border-left: 2px solid #b7770d; }
        .cal-event.LOW { background: #f0fdf4; color: #1a7a4a; border-left: 2px solid #1a7a4a; }
        .cal-event.DONE { background: #f4f6f8; color: #8a9bb0; border-left: 2px solid #d0d8e0; text-decoration: line-through; }
    </style>
</head>
<body>

<nav th:replace="~{fragments/topbar :: topbar}"></nav>

<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar('schedule-monthly')}"></div>

    <div class="flex-grow-1" style="min-height: calc(100vh - 42px); background: #f4f6f8;">
        <div class="bg-white border-bottom px-4 py-2 small text-muted">
            <span>홈</span> <span class="mx-1">▶</span>
            <span>스마트 일정</span> <span class="mx-1">▶</span>
            <span class="fw-bold" style="color:var(--n6);">월간 캘린더</span>
        </div>

        <div class="p-4">
            <!-- KPI -->
            <div class="row g-3 mb-3">
                <div class="col"><div class="card border position-relative overflow-hidden"><div class="kpi-line" style="background:var(--n6);"></div><div class="card-body py-2 ps-4"><div class="fs-4 fw-bold" th:text="${totalCount}">0</div><div class="text-muted small">이달 총 일정</div></div></div></div>
                <div class="col"><div class="card border position-relative overflow-hidden"><div class="kpi-line" style="background:#c0392b;"></div><div class="card-body py-2 ps-4"><div class="fs-4 fw-bold" th:text="${highCount}">0</div><div class="text-muted small">HIGH</div></div></div></div>
                <div class="col"><div class="card border position-relative overflow-hidden"><div class="kpi-line" style="background:#b7770d;"></div><div class="card-body py-2 ps-4"><div class="fs-4 fw-bold" th:text="${midCount}">0</div><div class="text-muted small">MID</div></div></div></div>
                <div class="col"><div class="card border position-relative overflow-hidden"><div class="kpi-line" style="background:#1a7a4a;"></div><div class="card-body py-2 ps-4"><div class="fs-4 fw-bold" th:text="${lowCount}">0</div><div class="text-muted small">LOW</div></div></div></div>
                <div class="col"><div class="card border position-relative overflow-hidden"><div class="kpi-line" style="background:#8a9bb0;"></div><div class="card-body py-2 ps-4"><div class="fs-4 fw-bold" th:text="${doneCount}">0</div><div class="text-muted small">DONE</div></div></div></div>
            </div>

            <!-- 캘린더 헤더 -->
            <div class="d-flex align-items-center justify-content-between mb-3">
                <div class="d-flex align-items-center gap-2">
                    <button class="btn btn-sm btn-outline-secondary" onclick="changeMonth(-1)">◀ 이전</button>
                    <span class="fw-bold" id="monthTitle" style="font-size:15px;">2026년 4월</span>
                    <button class="btn btn-sm btn-outline-secondary" onclick="changeMonth(1)">다음 ▶</button>
                    <button class="btn btn-sm text-white" style="background:var(--n6);" onclick="goToday()">오늘</button>
                </div>
                <div class="d-flex align-items-center gap-3 small text-muted">
                    <span><span class="d-inline-block me-1" style="width:10px;height:10px;background:#fdf2f2;border-left:2px solid #c0392b;"></span>HIGH</span>
                    <span><span class="d-inline-block me-1" style="width:10px;height:10px;background:#fffbeb;border-left:2px solid #b7770d;"></span>MID</span>
                    <span><span class="d-inline-block me-1" style="width:10px;height:10px;background:#f0fdf4;border-left:2px solid #1a7a4a;"></span>LOW</span>
                    <span><span class="d-inline-block me-1" style="width:10px;height:10px;background:#f4f6f8;border-left:2px solid #d0d8e0;"></span>DONE</span>
                    <a th:href="@{/schedule/create}" class="btn btn-sm text-white" style="background:var(--n6);">일정 등록</a>
                </div>
            </div>

            <!-- 캘린더 그리드 -->
            <div class="cal-grid" id="calGrid">
                <div class="cal-hd sun">일</div><div class="cal-hd">월</div><div class="cal-hd">화</div>
                <div class="cal-hd">수</div><div class="cal-hd">목</div><div class="cal-hd">금</div><div class="cal-hd sat">토</div>
            </div>

            <!-- 날짜 클릭 시 상세 -->
            <div id="dayDetail" class="mt-3" style="display:none;">
                <div class="card border">
                    <div class="card-body">
                        <h6 class="fw-bold mb-3" id="dayDetailTitle">선택 날짜 일정</h6>
                        <div id="dayDetailBody"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
let currentYear, currentMonth;
let events = [];

// 초기화
(function init() {
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth();
    fetchEvents();
})();

// 일정 데이터 로드
function fetchEvents() {
    fetch('/schedule/api/events')
        .then(r => r.json())
        .then(data => { events = data; renderCalendar(); })
        .catch(() => renderCalendar());
}

function changeMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderCalendar();
}

function goToday() {
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth();
    renderCalendar();

    // 오늘 날짜 셀 선택 + 스크롤
    setTimeout(() => {
        const todayCell = document.querySelector('.cal-cell.today');
        if (todayCell) {
            todayCell.scrollIntoView({ behavior: 'smooth', block: 'center' });
            todayCell.click();
        }
    }, 100);
}

function renderCalendar() {
    document.getElementById('monthTitle').textContent = currentYear + '년 ' + (currentMonth + 1) + '월';

    const grid = document.getElementById('calGrid');
    // 헤더만 남기고 초기화
    grid.querySelectorAll('.cal-cell').forEach(c => c.remove());

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
    const prevLastDate = new Date(currentYear, currentMonth, 0).getDate();
    const today = new Date();

    // 이전 달
    for (let i = firstDay - 1; i >= 0; i--) {
        const cell = createCell(prevLastDate - i, true);
        grid.appendChild(cell);
    }
    // 현재 달
    for (let d = 1; d <= lastDate; d++) {
        const isToday = (currentYear === today.getFullYear() && currentMonth === today.getMonth() && d === today.getDate());
        const cell = createCell(d, false, isToday);
        // 해당 날짜 이벤트 추가
        const dateStr = currentYear + '-' + String(currentMonth + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
        const dayEvents = events.filter(e => e.start && e.start.startsWith(dateStr));
        const maxShow = 2;
        dayEvents.slice(0, maxShow).forEach(ev => {
            const badge = document.createElement('div');
            const cls = ev.status === 'DONE' ? 'DONE' : ev.priority;
            badge.className = 'cal-event ' + cls;
            badge.textContent = ev.title;
            badge.onclick = function(e) { e.stopPropagation(); window.location.href = '/schedule/edit/' + ev.id + '?from=monthly'; };
            cell.appendChild(badge);
        });
        if (dayEvents.length > maxShow) {
            const more = document.createElement('div');
            more.className = 'cal-event-more';
            more.textContent = '+' + (dayEvents.length - maxShow) + '개 더보기';
            more.onclick = function(e) { e.stopPropagation(); selectCell(cell); showDayDetail(dateStr, dayEvents); };
            cell.appendChild(more);
        }
        cell.onclick = function() { selectCell(cell); showDayDetail(dateStr, dayEvents); };
        grid.appendChild(cell);
    }
    // 다음 달
    const totalCells = firstDay + lastDate;
    const remaining = (7 - (totalCells % 7)) % 7;
    for (let i = 1; i <= remaining; i++) {
        grid.appendChild(createCell(i, true));
    }
}

function createCell(day, isOther, isToday) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell' + (isOther ? ' other' : '') + (isToday ? ' today selected' : '');
    const dayDiv = document.createElement('div');
    dayDiv.className = 'cal-day';
    dayDiv.textContent = day;
    cell.appendChild(dayDiv);
    return cell;
}

// 셀 선택 (하늘색 배경)
function selectCell(cell) {
    document.querySelectorAll('.cal-cell').forEach(c => c.classList.remove('selected'));
    cell.classList.add('selected');
}

function showDayDetail(dateStr, dayEvents) {
    const detail = document.getElementById('dayDetail');
    const title = document.getElementById('dayDetailTitle');
    const body = document.getElementById('dayDetailBody');
    title.textContent = dateStr + ' 일정';

    if (dayEvents.length === 0) {
        body.innerHTML = '<div class="text-muted small">해당 날짜에 등록된 일정이 없습니다.</div>';
    } else {
        let html = '<table class="table table-sm small mb-0"><thead class="table-light"><tr><th>일정 제목</th><th>시작</th><th>우선순위</th><th>상태</th><th>관리</th></tr></thead><tbody>';
        dayEvents.forEach(ev => {
            const prCls = ev.priority === 'HIGH' ? 'bg-danger-subtle text-danger' : (ev.priority === 'MID' ? 'bg-warning-subtle text-warning' : 'bg-success-subtle text-success');
            const stCls = ev.status === 'DONE' ? 'bg-secondary-subtle text-secondary' : (ev.status === 'IN_PROGRESS' ? 'bg-warning-subtle text-warning' : 'bg-info-subtle text-info');
            html += '<tr><td class="fw-semibold">' + ev.title + '</td>';
            html += '<td class="text-muted">' + (ev.start ? ev.start.substring(11, 16) : '-') + '</td>';
            html += '<td><span class="badge ' + prCls + '">' + ev.priority + '</span></td>';
            html += '<td><span class="badge ' + stCls + '">' + ev.status + '</span></td>';
            html += '<td><a href="/schedule/edit/' + ev.id + '?from=monthly" class="btn btn-sm py-0 px-2 text-white" style="font-size:10px;background:var(--n6);">수정</a></td></tr>';
        });
        html += '</tbody></table>';
        body.innerHTML = html;
    }
    detail.style.display = 'block';
}
</script>
</body>
</html>
