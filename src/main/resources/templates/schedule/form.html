<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일정 등록/수정 - SmartLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<!-- 탑바 -->
<nav th:replace="~{fragments/topbar :: topbar}"></nav>

<div class="d-flex">
    <!-- 사이드바 -->
    <div th:replace="~{fragments/sidebar :: sidebar('schedule-list')}"></div>

    <!-- 메인 콘텐츠 -->
    <div class="flex-grow-1" style="min-height: calc(100vh - 42px); background: #f4f6f8;">
        <div class="bg-white border-bottom px-4 py-2 small text-muted">
            <span>홈</span> <span class="mx-1">▶</span>
            <span>스마트 일정</span> <span class="mx-1">▶</span>
            <span class="fw-bold" style="color:var(--n6);"
                  th:text="${scheduleDto.schId != null} ? '일정 수정' : '일정 등록'">일정 등록</span>
        </div>

        <div class="p-4">
            <div style="max-width: 620px;">
                <div class="d-flex align-items-center gap-2 mb-3">
                    <div class="sec-bar"></div>
                    <span class="fw-bold small"
                          th:text="${scheduleDto.schId != null} ? '일정 정보 수정' : '새 일정 등록'">새 일정 등록</span>
                </div>

                <div class="card border">
                    <div class="card-body p-4">
                        <form id="scheduleForm" th:action="${scheduleDto.schId != null} ? @{/schedule/edit/{id}(id=${scheduleDto.schId}, from=${from})} : @{/schedule/create}"
                              th:object="${scheduleDto}" method="post">
                            <!-- 일정 제목 -->
                            <div class="mb-3">
                                <label for="schTitle" class="form-label small fw-semibold">
                                    일정 제목 <span class="text-danger">*</span>
                                </label>
                                <input type="text" class="form-control" id="schTitle" th:field="*{schTitle}"
                                       placeholder="일정 제목을 입력하세요" required>
                                <div class="text-danger small mt-1"
                                     th:if="${#fields.hasErrors('schTitle')}" th:errors="*{schTitle}"></div>
                            </div>

                            <div class="row">
                                <!-- 시작 일시 -->
                                <div class="col-md-6 mb-3">
                                    <label for="startDt" class="form-label small fw-semibold">
                                        시작 일시 <span class="text-danger">*</span>
                                    </label>
                                    <input type="datetime-local" class="form-control" id="startDt" name="startDt"
                                           th:value="${scheduleDto.startDt != null ? #temporals.format(scheduleDto.startDt, 'yyyy-MM-dd''T''HH:mm') : ''}" required>
                                </div>
                                <!-- 종료 일시 -->
                                <div class="col-md-6 mb-3">
                                    <label for="endDt" class="form-label small fw-semibold">종료 일시</label>
                                    <input type="datetime-local" class="form-control" id="endDt" name="endDt"
                                           th:value="${scheduleDto.endDt != null ? #temporals.format(scheduleDto.endDt, 'yyyy-MM-dd''T''HH:mm') : ''}">
                                    <div class="text-muted small mt-1">NULL 허용 — 진행중 일정</div>
                                </div>
                            </div>

                            <div class="row">
                                <!-- 우선순위 -->
                                <div class="col-md-6 mb-3">
                                    <label for="priority" class="form-label small fw-semibold">
                                        우선순위 <span class="text-danger">*</span>
                                    </label>
                                    <select class="form-select" id="priority" th:field="*{priority}" required>
                                        <option value="HIGH">HIGH (긴급)</option>
                                        <option value="MID" selected>MID (보통)</option>
                                        <option value="LOW">LOW (낮음)</option>
                                    </select>
                                </div>
                                <!-- 상태 -->
                                <div class="col-md-6 mb-3">
                                    <label for="status" class="form-label small fw-semibold">
                                        상태 <span class="text-danger">*</span>
                                    </label>
                                    <select class="form-select" id="status" th:field="*{status}" required>
                                        <option value="PLANNED">PLANNED (예정)</option>
                                        <option value="IN_PROGRESS">IN_PROGRESS (진행중)</option>
                                        <option value="DONE">DONE (완료)</option>
                                    </select>
                                </div>
                            </div>

                            <!-- 업무 설명 -->
                            <div class="mb-3">
                                <label for="schMemo" class="form-label small fw-semibold">업무 설명 (선택)</label>
                                <textarea class="form-control" id="schMemo" name="schMemo" rows="2"
                                          th:text="${scheduleDto.schMemo}"
                                          placeholder="이 업무에 대한 간단한 설명"></textarea>
                                <div class="text-muted small mt-1">반복 업무의 경우 공통으로 적용됩니다</div>
                            </div>

                            <!-- 반복 업무 설정 -->
                            <div class="mb-3">
                                <label for="recurringSelect" class="form-label small fw-semibold">반복 주기 (선택)</label>
                                <select class="form-select" id="recurringSelect" onchange="onRecurringChange()">
                                    <option value="">반복 없음 (단건)</option>
                                    <option value="매일(주말포함)">매일 (주말 포함)</option>
                                    <option value="매일(평일만)">매일 (평일만)</option>
                                    <option value="매주">매주</option>
                                    <option value="매월">매월</option>
                                    <option value="매월 말일">매월 말일</option>
                                </select>
                                <!-- 매주 선택 시 요일 선택 -->
                                <div id="weekdaySelect" class="mt-2" style="display:none;">
                                    <label class="form-label small fw-semibold">반복 요일</label>
                                    <select class="form-select" id="weekdayValue">
                                        <option value="월요일">월요일</option>
                                        <option value="화요일">화요일</option>
                                        <option value="수요일">수요일</option>
                                        <option value="목요일">목요일</option>
                                        <option value="금요일">금요일</option>
                                        <option value="토요일">토요일</option>
                                        <option value="일요일">일요일</option>
                                    </select>
                                </div>
                                <!-- 매월 선택 시 몇째주 무슨요일 -->
                                <div id="monthDaySelect" class="mt-2" style="display:none;">
                                    <div class="d-flex gap-2">
                                        <div class="flex-fill">
                                            <label class="form-label small fw-semibold">몇째 주</label>
                                            <select class="form-select" id="monthWeekValue">
                                                <option value="첫째주">첫째 주</option>
                                                <option value="둘째주">둘째 주</option>
                                                <option value="셋째주">셋째 주</option>
                                                <option value="넷째주">넷째 주</option>
                                            </select>
                                        </div>
                                        <div class="flex-fill">
                                            <label class="form-label small fw-semibold">요일</label>
                                            <select class="form-select" id="monthDayValue">
                                                <option value="월요일">월요일</option>
                                                <option value="화요일">화요일</option>
                                                <option value="수요일">수요일</option>
                                                <option value="목요일">목요일</option>
                                                <option value="금요일">금요일</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                                <!-- 실제 전송되는 hidden 필드 -->
                                <input type="hidden" id="recurring" name="recurring" th:value="${scheduleDto.recurring}">
                                <div class="text-muted small mt-1">반복 주기를 설정하면 반복 업무로 등록됩니다</div>
                            </div>
                            <script>
                            function onRecurringChange() {
                                const sel = document.getElementById('recurringSelect').value;
                                document.getElementById('weekdaySelect').style.display = sel === '매주' ? '' : 'none';
                                document.getElementById('monthDaySelect').style.display = sel === '매월' ? '' : 'none';
                                updateRecurringValue();
                            }
                            function updateRecurringValue() {
                                const sel = document.getElementById('recurringSelect').value;
                                let val = sel;
                                if (sel === '매주') {
                                    val = '매주 ' + document.getElementById('weekdayValue').value;
                                } else if (sel === '매월') {
                                    val = '매월 ' + document.getElementById('monthWeekValue').value + ' ' + document.getElementById('monthDayValue').value;
                                }
                                document.getElementById('recurring').value = val;
                            }
                            // 변경 시 업데이트
                            document.getElementById('weekdayValue').addEventListener('change', updateRecurringValue);
                            document.getElementById('monthWeekValue').addEventListener('change', updateRecurringValue);
                            document.getElementById('monthDayValue').addEventListener('change', updateRecurringValue);
                            // 폼 제출 전 값 동기화
                            document.getElementById('scheduleForm').addEventListener('submit', updateRecurringValue);
                            // 수정 시 기존 값 복원
                            (function restoreRecurring() {
                                const saved = document.getElementById('recurring').value;
                                if (!saved) return;
                                const sel = document.getElementById('recurringSelect');
                                if (saved === '매일(주말포함)' || saved === '매일(평일만)' || saved === '매월 말일') {
                                    sel.value = saved;
                                } else if (saved.startsWith('매주')) {
                                    sel.value = '매주';
                                    const day = saved.replace('매주 ', '');
                                    document.getElementById('weekdayValue').value = day;
                                    document.getElementById('weekdaySelect').style.display = '';
                                } else if (saved.startsWith('매월') && saved !== '매월 말일') {
                                    sel.value = '매월';
                                    // "매월 둘째주 화요일" 파싱
                                    const parts = saved.replace('매월 ', '').split(' ');
                                    if (parts.length === 2) {
                                        document.getElementById('monthWeekValue').value = parts[0];
                                        document.getElementById('monthDayValue').value = parts[1];
                                    }
                                    document.getElementById('monthDaySelect').style.display = '';
                                }
                            })();
                            </script>

                            <!-- 버튼 -->
                            <hr>
                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="${from == 'weekly'} ? @{/schedule/weekly} : (${from == 'monthly'} ? @{/schedule/monthly} : (${from == 'recurring'} ? @{/schedule/recurring} : @{/schedule/list}))" class="btn btn-outline-secondary">취소</a>
                                <button type="submit" class="btn text-white fw-bold" style="background:var(--n6);"
                                        th:text="${scheduleDto.schId != null} ? '수정 완료' : '일정 등록'">일정 등록</button>
                            </div>

                            <!-- 수정 시 자기 자신 제외용 -->
                            <input type="hidden" id="excludeSchId" th:value="${scheduleDto.schId}">
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 일정 충돌 경고 모달 -->
<div class="modal fade" id="conflictModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header" style="background:#fff3cd; border-bottom:1px solid #ffeaa7;">
                <h6 class="modal-title fw-bold" style="color:#856404;">
                    ⚠ 일정 충돌 감지
                </h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p class="small mb-3">선택하신 시간대에 <strong>이미 등록된 일정</strong>이 있습니다.</p>
                <div id="conflictList" class="border rounded p-2" style="background:#f8f9fa; max-height:240px; overflow-y:auto;">
                    <!-- JS로 동적 추가 -->
                </div>
                <p class="small text-muted mt-3 mb-0">그래도 등록하시겠습니까?</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">취소</button>
                <button type="button" class="btn btn-warning btn-sm fw-bold" id="forceSubmitBtn">그래도 등록</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // 일정 충돌 검사 — 폼 제출 전 인터셉트
    (function () {
        const form = document.getElementById('scheduleForm');
        let bypassConflict = false; // "그래도 등록" 클릭 시 true

        form.addEventListener('submit', async function (e) {
            console.log('[충돌검사] submit 이벤트 발생, bypass=', bypassConflict);
            if (bypassConflict) return;

            const startDt = document.getElementById('startDt').value;
            const endDt = document.getElementById('endDt').value;
            console.log('[충돌검사] startDt=', startDt, 'endDt=', endDt);
            if (!startDt || !endDt) {
                console.log('[충돌검사] 종료일시 미입력 → 검사 스킵');
                return;
            }

            e.preventDefault();
            const excludeSchId = document.getElementById('excludeSchId').value;
            const params = new URLSearchParams({ startDt, endDt });
            if (excludeSchId) params.append('excludeSchId', excludeSchId);
            console.log('[충돌검사] API 호출:', '/schedule/api/check-conflict?' + params.toString());

            try {
                const res = await fetch('/schedule/api/check-conflict?' + params.toString());
                const conflicts = await res.json();
                console.log('[충돌검사] 응답:', conflicts);
                if (conflicts.length === 0) {
                    bypassConflict = true;
                    form.submit();
                } else {
                    showConflictModal(conflicts);
                }
            } catch (err) {
                console.error('[충돌검사] API 오류:', err);
                bypassConflict = true;
                form.submit();
            }
        });

        function showConflictModal(conflicts) {
            const list = document.getElementById('conflictList');
            list.innerHTML = conflicts.map(c => {
                const color = c.priority === 'HIGH' ? '#c0392b' : (c.priority === 'MID' ? '#b7770d' : '#5a8556');
                return `
                    <div class="d-flex align-items-center gap-2 py-1">
                        <span class="badge" style="background:${color};">${c.priority}</span>
                        <strong class="small">${escapeHtml(c.title)}</strong>
                        <span class="small text-muted ms-auto">${c.startDt} ~ ${c.endDt}</span>
                    </div>
                `;
            }).join('');
            new bootstrap.Modal(document.getElementById('conflictModal')).show();
        }

        document.getElementById('forceSubmitBtn').addEventListener('click', function () {
            bypassConflict = true;
            bootstrap.Modal.getInstance(document.getElementById('conflictModal')).hide();
            form.submit();
        });

        function escapeHtml(s) {
            return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }
    })();
</script>
</body>
</html>
