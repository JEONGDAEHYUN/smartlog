<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일정 등록/수정 - SmartLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<!-- 탑바 -->
<nav th:replace="~{fragments/topbar :: topbar}"></nav>

<div class="d-flex">
    <!-- 사이드바 -->
    <div th:replace="~{fragments/sidebar :: sidebar('schedule-list')}"></div>

    <!-- 메인 콘텐츠 -->
    <div class="flex-grow-1" style="min-height: calc(100vh - 42px); background: #f4f6f8;">
        <div class="bg-white border-bottom px-4 py-2 small text-muted">
            <span>홈</span> <span class="mx-1">▶</span>
            <span>스마트 일정</span> <span class="mx-1">▶</span>
            <span class="fw-bold" style="color:var(--n6);"
                  th:text="${scheduleDto.schId != null} ? '일정 수정' : '일정 등록'">일정 등록</span>
        </div>

        <div class="p-4">
            <div style="max-width: 620px;">
                <div class="d-flex align-items-center gap-2 mb-3">
                    <div class="sec-bar"></div>
                    <span class="fw-bold small"
                          th:text="${scheduleDto.schId != null} ? '일정 정보 수정' : '새 일정 등록'">새 일정 등록</span>
                </div>

                <div class="card border">
                    <div class="card-body p-4">
                        <form th:action="${scheduleDto.schId != null} ? @{/schedule/edit/{id}(id=${scheduleDto.schId})} : @{/schedule/create}"
                              th:object="${scheduleDto}" method="post">
                            <!-- 일정 제목 -->
                            <div class="mb-3">
                                <label for="schTitle" class="form-label small fw-semibold">
                                    일정 제목 <span class="text-danger">*</span>
                                </label>
                                <input type="text" class="form-control" id="schTitle" th:field="*{schTitle}"
                                       placeholder="일정 제목을 입력하세요" required>
                                <div class="text-danger small mt-1"
                                     th:if="${#fields.hasErrors('schTitle')}" th:errors="*{schTitle}"></div>
                            </div>

                            <div class="row">
                                <!-- 시작 일시 -->
                                <div class="col-md-6 mb-3">
                                    <label for="startDt" class="form-label small fw-semibold">
                                        시작 일시 <span class="text-danger">*</span>
                                    </label>
                                    <input type="datetime-local" class="form-control" id="startDt" th:field="*{startDt}" required>
                                </div>
                                <!-- 종료 일시 -->
                                <div class="col-md-6 mb-3">
                                    <label for="endDt" class="form-label small fw-semibold">종료 일시</label>
                                    <input type="datetime-local" class="form-control" id="endDt" th:field="*{endDt}">
                                    <div class="text-muted small mt-1">NULL 허용 — 진행중 일정</div>
                                </div>
                            </div>

                            <div class="row">
                                <!-- 우선순위 -->
                                <div class="col-md-6 mb-3">
                                    <label for="priority" class="form-label small fw-semibold">
                                        우선순위 <span class="text-danger">*</span>
                                    </label>
                                    <select class="form-select" id="priority" th:field="*{priority}" required>
                                        <option value="HIGH">HIGH (긴급)</option>
                                        <option value="MID" selected>MID (보통)</option>
                                        <option value="LOW">LOW (낮음)</option>
                                    </select>
                                </div>
                                <!-- 상태 -->
                                <div class="col-md-6 mb-3">
                                    <label for="status" class="form-label small fw-semibold">
                                        상태 <span class="text-danger">*</span>
                                    </label>
                                    <select class="form-select" id="status" th:field="*{status}" required>
                                        <option value="PLANNED">PLANNED (예정)</option>
                                        <option value="IN_PROGRESS">IN_PROGRESS (진행중)</option>
                                        <option value="DONE">DONE (완료)</option>
                                    </select>
                                </div>
                            </div>

                            <!-- 반복 업무 설정 -->
                            <div class="mb-3">
                                <label for="recurring" class="form-label small fw-semibold">반복 주기 (선택)</label>
                                <select class="form-select" id="recurring" th:field="*{recurring}">
                                    <option value="">반복 없음 (단건)</option>
                                    <option value="매일">매일</option>
                                    <option value="매주 월요일">매주 월요일</option>
                                    <option value="매주 화요일">매주 화요일</option>
                                    <option value="매주 수요일">매주 수요일</option>
                                    <option value="매주 목요일">매주 목요일</option>
                                    <option value="매주 금요일">매주 금요일</option>
                                    <option value="매월">매월</option>
                                    <option value="매월 말일">매월 말일</option>
                                </select>
                                <div class="text-muted small mt-1">반복 주기를 설정하면 반복 업무로 등록됩니다</div>
                            </div>

                            <!-- 버튼 -->
                            <hr>
                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{/schedule/list}" class="btn btn-outline-secondary">취소</a>
                                <button type="submit" class="btn text-white fw-bold" style="background:var(--n6);"
                                        th:text="${scheduleDto.schId != null} ? '수정 완료' : '일정 등록'">일정 등록</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
