<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일정 확정 - SmartLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<nav th:replace="~{fragments/topbar :: topbar}"></nav>

<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar('worklog-archive')}"></div>

    <div class="flex-grow-1" style="min-height: calc(100vh - 42px); background: #f4f6f8;">
        <div class="bg-white border-bottom px-4 py-2 small text-muted">
            <span>홈</span> <span class="mx-1">▶</span>
            <span>AI 업무일지</span> <span class="mx-1">▶</span>
            <span>업무일지 상세</span> <span class="mx-1">▶</span>
            <span class="fw-bold" style="color:var(--n6);">일정 확정</span>
        </div>

        <div class="p-4">
            <!-- UUID 매핑 정보 -->
            <div class="uuid-box mb-3">
                <span style="color:var(--n6); font-weight:700;">LOG_ID</span>
                <span style="color:var(--n4); margin:0 8px;">→</span>
                <span th:text="${worklog.logId}" style="color:#1a7a4a;">UUID</span>
                <span class="ms-2">| Cross-DB 연결: WORKLOG ↔ SCH_INFO</span>
            </div>

            <div class="row g-4">
                <!-- 좌측: 일정 정보 입력 -->
                <div class="col-lg-6">
                    <div class="d-flex align-items-center gap-2 mb-3">
                        <div class="sec-bar"></div>
                        <span class="fw-bold small">AI 추출 일정 정보 확인 및 수정</span>
                    </div>

                    <div class="card border">
                        <div class="card-body p-4">
                            <form th:action="@{/worklog/confirm/{id}(id=${worklog.logId})}" th:object="${scheduleDto}" method="post">
                                <div class="mb-3">
                                    <label for="schTitle" class="form-label small fw-semibold">
                                        일정 제목 <span class="text-danger">*</span>
                                    </label>
                                    <input type="text" class="form-control" id="schTitle" th:field="*{schTitle}"
                                           placeholder="AI 정제 결과를 참고하여 일정 제목을 입력하세요" required>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label for="startDt" class="form-label small fw-semibold">
                                            시작 일시 <span class="text-danger">*</span>
                                        </label>
                                        <input type="datetime-local" class="form-control" id="startDt" th:field="*{startDt}" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="endDt" class="form-label small fw-semibold">종료 일시</label>
                                        <input type="datetime-local" class="form-control" id="endDt" th:field="*{endDt}">
                                        <div class="text-muted small mt-1">NULL 허용 — 진행중 일정</div>
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label for="priority" class="form-label small fw-semibold">우선순위</label>
                                        <select class="form-select" id="priority" th:field="*{priority}">
                                            <option value="HIGH">HIGH (긴급)</option>
                                            <option value="MID">MID (보통)</option>
                                            <option value="LOW">LOW (낮음)</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="status" class="form-label small fw-semibold">초기 상태</label>
                                        <select class="form-select" id="status" th:field="*{status}">
                                            <option value="PLANNED">PLANNED (예정)</option>
                                            <option value="IN_PROGRESS">IN_PROGRESS (진행중)</option>
                                        </select>
                                    </div>
                                </div>
                                <hr>
                                <div class="d-flex justify-content-between">
                                    <a th:href="@{/worklog/detail/{id}(id=${worklog.logId})}" class="btn btn-outline-secondary">취소</a>
                                    <button type="submit" class="btn text-white fw-bold" style="background:#1a7a4a;">
                                        일정 확정 → 저장
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- 우측: AI 정제 결과 원문 -->
                <div class="col-lg-6">
                    <div class="d-flex align-items-center gap-2 mb-3">
                        <div class="sec-bar"></div>
                        <span class="fw-bold small">AI 정제 결과 원문</span>
                        <span class="gemini-badge ms-2">Gemini 정제 결과</span>
                    </div>

                    <div class="card border" style="border-color:#ddd6fe !important;">
                        <div class="card-body p-4" style="background:#f9f4ff; border-radius:7px;">
                            <div class="small" style="line-height:1.9; color:#5a6a7a; white-space:pre-wrap;"
                                 th:text="${worklog.refinedContent}">AI 정제 결과</div>
                        </div>
                    </div>

                    <!-- 원본 메모 -->
                    <div class="mt-3">
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <div class="sec-bar"></div>
                            <span class="fw-bold small">원본 메모</span>
                        </div>
                        <div class="card border">
                            <div class="card-body small text-muted" style="white-space:pre-wrap;"
                                 th:text="${worklog.rawContent}">원본</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
