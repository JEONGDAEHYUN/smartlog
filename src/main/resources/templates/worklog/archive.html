<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업무 아카이브 - SmartLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<!-- 탑바 -->
<nav th:replace="~{fragments/topbar :: topbar}"></nav>

<div class="d-flex">
    <!-- 사이드바 -->
    <div th:replace="~{fragments/sidebar :: sidebar('worklog-archive')}"></div>

    <!-- 메인 콘텐츠 -->
    <div class="flex-grow-1" style="min-height: calc(100vh - 42px); background: #f4f6f8;">
        <div class="bg-white border-bottom px-4 py-2 small text-muted">
            <span>홈</span> <span class="mx-1">▶</span>
            <span>AI 업무일지</span> <span class="mx-1">▶</span>
            <span class="fw-bold" style="color:var(--n6);">업무 아카이브</span>
        </div>

        <div class="p-4">

            <!-- 검색 필터 -->
            <div class="d-flex align-items-center gap-2 mb-3 flex-wrap">
                <input type="text" class="form-control form-control-sm" style="width:180px;" placeholder="내용 검색..." id="searchInput">
                <select class="form-select form-select-sm" style="width:120px;" id="statusFilter">
                    <option value="">전체 상태</option>
                    <option value="RAW">RAW</option>
                    <option value="PROCESSING">PROCESSING</option>
                    <option value="SUCCESS">SUCCESS</option>
                    <option value="FAILED">FAILED</option>
                </select>
                <input type="date" class="form-control form-control-sm" style="width:140px;" id="startDate">
                <span class="small text-muted">~</span>
                <input type="date" class="form-control form-control-sm" style="width:140px;" id="endDate">
                <button class="btn btn-sm text-white d-flex align-items-center gap-1" style="background:var(--n6);" onclick="filterTable()">
                    <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="#fff" stroke-width="1.5" fill="none"/><path d="M10.5 10.5L14 14" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>
                    검색
                </button>
                <a th:href="@{/worklog/write}" class="btn btn-sm text-white ms-auto d-flex align-items-center gap-1" style="background:var(--n9);">
                    <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg>
                    메모 작성
                </a>
            </div>

            <!-- 아카이브 목록 -->
            <div class="card border">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 small" id="archiveTable">
                        <thead class="table-light">
                            <tr>
                                <th>원본 내용 요약</th>
                                <th>AI 정제 결과 요약</th>
                                <th>처리 상태</th>
                                <th>확정 일지</th>
                                <th>생성 일시</th>
                                <th>액션</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(worklogs)}">
                                <td colspan="6" class="text-center text-muted py-4">작성된 업무일지가 없습니다.</td>
                            </tr>
                            <tr th:each="log : ${worklogs}" class="archive-row"
                                th:data-status="${log.status}"
                                th:data-raw="${log.rawContent}"
                                th:data-date="${log.createdAt != null ? #temporals.format(log.createdAt, 'yyyy-MM-dd') : ''}">
                                <!-- 원본 내용 요약 -->
                                <td class="td-truncate"
                                    th:text="${#strings.abbreviate(log.rawContent, 40)}">원본 내용</td>
                                <!-- AI 정제 결과 요약 -->
                                <td class="td-truncate">
                                    <span th:if="${log.refinedContent != null}" style="color:var(--gemini);"
                                          th:text="${#strings.abbreviate(log.refinedContent, 40)}">정제 결과</span>
                                    <span th:if="${log.refinedContent == null && log.status == 'FAILED'}"
                                          class="text-danger">처리 실패</span>
                                    <span th:if="${log.refinedContent == null && log.status != 'FAILED'}"
                                          class="text-muted">AI 가공 미요청</span>
                                </td>
                                <!-- 처리 상태 -->
                                <td>
                                    <span class="badge"
                                          th:classappend="${log.status == 'SUCCESS'} ? 'bg-success-subtle text-success' : (${log.status == 'PROCESSING'} ? 'bg-warning-subtle text-warning' : (${log.status == 'FAILED'} ? 'bg-danger-subtle text-danger' : 'bg-secondary-subtle text-secondary'))"
                                          th:text="${log.status}">RAW</span>
                                </td>
                                <!-- 확정 일지 -->
                                <td>
                                    <span class="text-muted" style="font-size:11px;">미연결</span>
                                </td>
                                <!-- 생성 일시 -->
                                <td class="text-muted" style="font-size:11px;"
                                    th:text="${log.createdAt != null ? #temporals.format(log.createdAt, 'MM.dd HH:mm') : '-'}">날짜</td>
                                <!-- 액션 -->
                                <td>
                                    <div class="d-flex gap-1">
                                        <a th:href="@{/worklog/detail/{id}(id=${log.logId})}"
                                           class="btn btn-sm py-0 px-2" style="font-size:10px; background:var(--n6); color:#fff; height:28px; line-height:28px;">상세</a>
                                        <!-- RAW: AI 가공 버튼 -->
                                        <form th:if="${log.status == 'RAW'}"
                                              th:action="@{/worklog/refine/{id}(id=${log.logId})}" method="post" class="d-inline">
                                            <button type="submit" class="btn-gemini-sm">
                                                <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="4.5" stroke="#fff" stroke-width="1.3" fill="none"/><path d="M4 6l1.5 1.5 3-3" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                                                AI 가공
                                            </button>
                                        </form>
                                        <!-- FAILED: 재처리 버튼 -->
                                        <form th:if="${log.status == 'FAILED'}"
                                              th:action="@{/worklog/refine/{id}(id=${log.logId})}" method="post" class="d-inline">
                                            <button type="submit" class="btn-gemini-sm">
                                                <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="4.5" stroke="#fff" stroke-width="1.3" fill="none"/><path d="M6 4v2.5l1.5 1.5" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/></svg>
                                                재처리
                                            </button>
                                        </form>
                                        <!-- 삭제 버튼 -->
                                        <form th:action="@{/worklog/delete/{id}(id=${log.logId})}" method="post" class="d-inline"
                                              onsubmit="return confirm('정말 삭제하시겠습니까?');">
                                            <button type="submit" class="btn btn-outline-danger btn-sm py-0 px-2"
                                                    style="font-size:10px; height:28px; line-height:28px;">삭제</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // 검색 필터 (키워드 + 상태 + 기간)
    function filterTable() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        const status = document.getElementById('statusFilter').value;
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const rows = document.querySelectorAll('.archive-row');

        rows.forEach(row => {
            const raw = (row.dataset.raw || '').toLowerCase();
            const rowStatus = row.dataset.status || '';
            const rowDate = row.dataset.date || '';
            const matchKeyword = !keyword || raw.includes(keyword);
            const matchStatus = !status || rowStatus === status;
            const matchStart = !startDate || rowDate >= startDate;
            const matchEnd = !endDate || rowDate <= endDate;
            row.style.display = (matchKeyword && matchStatus && matchStart && matchEnd) ? '' : 'none';
        });
    }

    // 엔터키로 검색
    document.getElementById('searchInput').addEventListener('keyup', function(e) {
        if (e.key === 'Enter') filterTable();
    });
</script>
</body>
</html>
