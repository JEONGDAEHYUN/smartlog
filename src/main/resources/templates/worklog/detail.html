<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업무일지 상세 - SmartLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<!-- 탑바 -->
<nav th:replace="~{fragments/topbar :: topbar}"></nav>

<div class="d-flex">
    <!-- 사이드바 -->
    <div th:replace="~{fragments/sidebar :: sidebar('worklog-archive')}"></div>

    <!-- 메인 콘텐츠 -->
    <div class="flex-grow-1" style="min-height: calc(100vh - 42px); background: #f4f6f8;">
        <div class="bg-white border-bottom px-4 py-2 small text-muted">
            <span>홈</span> <span class="mx-1">▶</span>
            <span>AI 업무일지</span> <span class="mx-1">▶</span>
            <span class="fw-bold" style="color:var(--n6);">업무일지 상세</span>
        </div>

        <div class="p-4">
            <!-- 상태 표시 -->
            <div class="d-flex align-items-center gap-2 mb-3">
                <span class="badge" th:classappend="${worklog.status == 'SUCCESS'} ? 'bg-success' : (${worklog.status == 'PROCESSING'} ? 'bg-warning' : (${worklog.status == 'FAILED'} ? 'bg-danger' : 'bg-secondary'))"
                      th:text="${worklog.status == 'SUCCESS'} ? '정제 완료' : (${worklog.status == 'PROCESSING'} ? '처리 중' : (${worklog.status == 'FAILED'} ? '정제 실패' : '임시저장'))">상태</span>
                <span class="text-muted small" th:text="${worklog.createdAt != null ? #temporals.format(worklog.createdAt, 'yyyy-MM-dd HH:mm') : ''}">생성일</span>
            </div>

            <!-- 원본 vs 정제 비교 -->
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <div class="card border overflow-hidden">
                        <div class="compare-header bg-light">원본 메모</div>
                        <div class="compare-body" th:text="${worklog.rawContent}">원본 내용</div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card border overflow-hidden" style="border-color:#ddd6fe !important;">
                        <div class="compare-header text-white" style="background:var(--gemini);">
                            AI 정제 결과
                        </div>
                        <div class="compare-body" th:if="${worklog.refinedContent != null}" th:text="${worklog.refinedContent}">정제 내용</div>
                        <div class="compare-body text-muted" th:if="${worklog.refinedContent == null}">
                            <span th:if="${worklog.status == 'RAW'}">아직 AI 정제가 요청되지 않았습니다.</span>
                            <span th:if="${worklog.status == 'PROCESSING'}">AI 정제 처리 중입니다...</span>
                            <span th:if="${worklog.status == 'FAILED'}">AI 정제에 실패했습니다. 재시도해주세요.</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 액션 버튼 -->
            <div class="d-flex gap-2">
                <a th:href="@{/worklog/archive}" class="btn btn-outline-secondary">목록으로</a>
                <a th:href="@{/worklog/write}" class="btn btn-outline-secondary">새 메모 작성</a>
                <form th:if="${worklog.status == 'RAW' || worklog.status == 'FAILED'}"
                      th:action="@{/worklog/refine/{id}(id=${worklog.logId})}" method="post" class="d-inline">
                    <button type="submit" class="btn text-white fw-bold" style="background:var(--gemini);">
                        AI 정제 요청
                    </button>
                </form>
                <!-- SUCCESS 상태일 때 일지 확정 버튼 -->
                <a th:if="${worklog.status == 'SUCCESS'}"
                   th:href="@{/worklog/confirm/{id}(id=${worklog.logId})}"
                   class="btn text-white fw-bold" style="background:#1a7a4a;">
                    일지 확정 →
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
