<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이디 찾기 - SmartLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --n9: #0d1f35; --n6: #2d6ca8; }
        body { background-color: #f4f6f8; min-height: 100vh; }
    </style>
</head>
<body>
<div class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="card shadow-sm border" style="max-width: 420px; width: 100%;">
        <div class="card-body p-4 p-md-5">
            <h4 class="fw-bold mb-1">아이디(이메일) 찾기</h4>
            <p class="text-muted small mb-4">가입 시 등록한 이름과 조직명으로 이메일을 조회합니다</p>

            <!-- 에러 메시지 -->
            <div th:if="${error}" class="alert alert-danger small py-2" th:text="${error}"></div>

            <!-- 조회 결과 -->
            <div th:if="${maskedEmail}" class="p-3 mb-3 rounded" style="background:#eef7ff; border:1px solid #b8d8f8;">
                <div class="text-muted small mb-1">조회된 이메일 (마스킹)</div>
                <div class="fs-5 fw-bold" th:text="${maskedEmail}">ho**@smartlog.kr</div>
            </div>

            <!-- 아이디 찾기 폼 -->
            <form th:action="@{/find-id}" method="post" th:unless="${maskedEmail}">
                <div class="mb-3">
                    <label for="userName" class="form-label small fw-semibold">
                        이름 <span class="text-danger">*</span>
                    </label>
                    <input type="text" class="form-control" id="userName" name="userName"
                           placeholder="홍길동" required>
                </div>
                <div class="mb-3">
                    <label for="orgName" class="form-label small fw-semibold">
                        조직명 <span class="text-danger">*</span>
                    </label>
                    <input type="text" class="form-control" id="orgName" name="orgName"
                           placeholder="항공정비팀" required>
                </div>
                <button type="submit" class="btn w-100 fw-bold text-white py-2"
                        style="background-color: var(--n9);">이메일 조회</button>
            </form>

            <!-- 하단 링크 -->
            <div class="d-flex justify-content-center gap-2 mt-4 small">
                <a th:href="@{/login}" class="text-decoration-none" style="color: var(--n6);">로그인으로</a>
                <span class="text-muted">|</span>
                <a th:href="@{/find-pw}" class="text-decoration-none" style="color: var(--n6);">비밀번호 찾기</a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
