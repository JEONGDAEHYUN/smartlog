<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - SmartLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --n9: #0d1f35; --n6: #2d6ca8; --n4: #4a8fc4; }
        body { background-color: #f4f6f8; min-height: 100vh; }

        /* 스텝바 */
        .step-bar { display: flex; border: 1px solid #d0d8e0; border-radius: 7px; overflow: hidden; }
        .step-item { flex: 1; padding: 10px 14px; display: flex; align-items: center; gap: 8px;
                     border-right: 1px solid #d0d8e0; font-size: 13px; background: #fff; color: #8a9bb0; }
        .step-item:last-child { border-right: none; }
        .step-item.active { background: var(--n6); color: #fff; }
        .step-num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center;
                    justify-content: center; font-size: 12px; font-weight: 700; background: #e0e8f0; color: #8a9bb0; }
        .step-item.active .step-num { background: #fff; color: var(--n6); }
    </style>
</head>
<body>
<div class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div style="width: 100%; max-width: 620px; padding: 24px;">

        <h4 class="fw-bold mb-4">회원가입</h4>

        <!-- 스텝바 (화면설계서 stepbar) -->
        <div class="step-bar mb-4">
            <div class="step-item active">
                <div class="step-num">1</div><span>기본 정보 입력</span>
            </div>
            <div class="step-item">
                <div class="step-num">2</div><span>이메일 인증</span>
            </div>
            <div class="step-item">
                <div class="step-num">3</div><span>가입 완료</span>
            </div>
        </div>

        <!-- 회원가입 카드 -->
        <div class="card shadow-sm border">
            <div class="card-body p-4">

                <!-- 에러 메시지 -->
                <div th:if="${error}" class="alert alert-danger small py-2" th:text="${error}"></div>

                <!-- 회원가입 폼 -->
                <form th:action="@{/signup}" th:object="${signupDto}" method="post">
                    <div class="row">
                        <!-- 이메일 -->
                        <div class="col-12 mb-3">
                            <label for="userEmail" class="form-label small fw-semibold">
                                이메일 <span class="text-danger">*</span>
                            </label>
                            <input type="email" class="form-control" id="userEmail" th:field="*{userEmail}"
                                   placeholder="user@smartlog.kr" required>
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('userEmail')}" th:errors="*{userEmail}"></div>
                        </div>
                        <!-- 비밀번호 -->
                        <div class="col-md-6 mb-3">
                            <label for="userPwd" class="form-label small fw-semibold">
                                비밀번호 <span class="text-danger">*</span>
                            </label>
                            <input type="password" class="form-control" id="userPwd" th:field="*{userPwd}"
                                   placeholder="8자 이상" required>
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('userPwd')}" th:errors="*{userPwd}"></div>
                        </div>
                        <!-- 비밀번호 확인 -->
                        <div class="col-md-6 mb-3">
                            <label for="userPwdConfirm" class="form-label small fw-semibold">
                                비밀번호 확인 <span class="text-danger">*</span>
                            </label>
                            <input type="password" class="form-control" id="userPwdConfirm"
                                   placeholder="비밀번호 재입력" required>
                        </div>
                        <!-- 이름 -->
                        <div class="col-md-6 mb-3">
                            <label for="userName" class="form-label small fw-semibold">
                                이름 <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control" id="userName" th:field="*{userName}"
                                   placeholder="홍길동" required>
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}"></div>
                        </div>
                        <!-- 조직명 -->
                        <div class="col-md-6 mb-3">
                            <label for="orgName" class="form-label small fw-semibold">
                                조직명 <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control" id="orgName" th:field="*{orgName}"
                                   placeholder="소속 부서 또는 팀명" required>
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('orgName')}" th:errors="*{orgName}"></div>
                        </div>
                    </div>

                    <!-- 버튼 -->
                    <hr>
                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/login}" class="btn btn-outline-secondary">취소</a>
                        <button type="submit" class="btn text-white fw-bold"
                                style="background-color: var(--n6);">다음 단계 →</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
