<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이메일 인증 - SmartLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --n9: #0d1f35; --n6: #2d6ca8; }
        body { background-color: #f4f6f8; min-height: 100vh; }
        .step-bar { display: flex; border: 1px solid #d0d8e0; border-radius: 7px; overflow: hidden; }
        .step-item { flex: 1; padding: 10px 14px; display: flex; align-items: center; gap: 8px;
                     border-right: 1px solid #d0d8e0; font-size: 13px; background: #fff; color: #8a9bb0; }
        .step-item:last-child { border-right: none; }
        .step-item.active { background: var(--n6); color: #fff; }
        .step-item.done { background: #eef7ff; color: var(--n6); }
        .step-num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center;
                    justify-content: center; font-size: 12px; font-weight: 700; background: #e0e8f0; color: #8a9bb0; }
        .step-item.active .step-num { background: #fff; color: var(--n6); }
        .step-item.done .step-num { background: var(--n6); color: #fff; }
    </style>
</head>
<body>
<div class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div style="width: 100%; max-width: 620px; padding: 24px;">

        <h4 class="fw-bold mb-4">회원가입</h4>

        <!-- 스텝바 -->
        <div class="step-bar mb-4">
            <div class="step-item done">
                <div class="step-num">1</div><span>기본 정보 입력</span>
            </div>
            <div class="step-item active">
                <div class="step-num">2</div><span>이메일 인증</span>
            </div>
            <div class="step-item">
                <div class="step-num">3</div><span>가입 완료</span>
            </div>
        </div>

        <div class="card shadow-sm border">
            <div class="card-body p-4 text-center">
                <!-- 이메일 아이콘 -->
                <div class="mx-auto mb-3 d-flex align-items-center justify-content-center"
                     style="width:48px; height:48px; background:#eef7ff; border-radius:12px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <rect x="2" y="5" width="20" height="14" rx="2" stroke="#2d6ca8" stroke-width="1.5" fill="none"/>
                        <path d="M2 8l10 7 10-7" stroke="#2d6ca8" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>

                <h5 class="fw-bold mb-2">이메일 인증</h5>
                <p class="text-muted small mb-3">
                    가입한 이메일로 인증 코드를 발송했습니다.<br>
                    유효시간: <strong>10분</strong>
                </p>

                <!-- 에러 메시지 -->
                <div th:if="${error}" class="alert alert-danger small py-2" th:text="${error}"></div>

                <!-- 인증코드 입력 폼 -->
                <form th:action="@{/signup/verify}" method="post">
                    <input type="hidden" name="email" th:value="${email}">
                    <div class="d-flex gap-2 justify-content-center mb-3" style="max-width:300px; margin:0 auto;">
                        <input type="text" class="form-control text-center" name="inputCode"
                               placeholder="인증 코드 6자리" maxlength="6"
                               style="letter-spacing:4px; font-size:15px;" required>
                        <button type="submit" class="btn text-white" style="background:var(--n6); white-space:nowrap;">확인</button>
                    </div>
                </form>

                <a th:href="@{/signup}" class="small text-decoration-none" style="color:var(--n6);">처음부터 다시 하기</a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
