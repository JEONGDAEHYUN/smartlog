<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보고서 생성 - SmartLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<!-- 탑바 -->
<nav th:replace="~{fragments/topbar :: topbar}"></nav>

<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar('report-create')}"></div>

    <div class="flex-grow-1" style="min-height: calc(100vh - 42px); background: #f4f6f8;">
        <div class="bg-white border-bottom px-4 py-2 small text-muted">
            <span>홈</span> <span class="mx-1">▶</span>
            <span>지능형 리포트</span> <span class="mx-1">▶</span>
            <span class="fw-bold" style="color:var(--n6);">보고서 생성</span>
        </div>

        <div class="p-4">
            <div class="card border mb-4">
                <div class="card-body p-4">
                    <div class="d-flex align-items-center gap-2 mb-3">
                        <div class="sec-bar"></div>
                        <span class="fw-bold small">보고서 설정</span>
                        <span class="gemini-badge ms-2">Gemini AI 연동</span>
                    </div>

                    <form th:action="@{/report/create}" method="post">
                        <div class="row g-3 mb-3">
                            <div class="col-md-12">
                                <label for="reportType" class="form-label small fw-semibold">
                                    보고서 종류 <span class="text-danger">*</span>
                                </label>
                                <select class="form-select" id="reportType" name="reportType" required onchange="updateDateRange()">
                                    <option value="weekly">주간 업무요약 보고서</option>
                                    <option value="monthly" selected>월간 업무요약 보고서</option>
                                    <option value="handover">인수인계 보고서</option>
                                    <option value="direct">직접입력 보고서</option>
                                </select>
                            </div>
                        </div>

                        <!-- 직접입력 보고서 제목 입력 (종류 = direct 일 때만 표시) -->
                        <div class="row g-3 mb-3" id="customTitleRow" style="display:none;">
                            <div class="col-md-12">
                                <label for="customTitle" class="form-label small fw-semibold">
                                    보고서 제목 <span class="text-danger">*</span>
                                </label>
                                <input type="text" class="form-control" id="customTitle" name="customTitle"
                                       placeholder="예: 5월 4주차 프로젝트 진행 보고">
                            </div>
                        </div>

                        <!-- 빠른 기간 선택 버튼 그룹 -->
                        <div class="mb-2">
                            <label class="form-label small fw-semibold">빠른 선택</label>
                            <div class="d-flex gap-2 flex-wrap">
                                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="setQuickRange('thisWeek')">이번 주</button>
                                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="setQuickRange('thisMonth')">이번 달</button>
                                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="setQuickRange('lastMonth')">지난 달</button>
                                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="setQuickRange('last7')">최근 7일</button>
                                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="setQuickRange('last30')">최근 30일</button>
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="startDate" class="form-label small fw-semibold">
                                    시작일 <span class="text-danger">*</span>
                                </label>
                                <input type="date" class="form-control" id="startDate" name="startDate" required>
                            </div>
                            <div class="col-md-6">
                                <label for="endDate" class="form-label small fw-semibold">
                                    종료일 <span class="text-danger">*</span>
                                </label>
                                <input type="date" class="form-control" id="endDate" name="endDate" required>
                            </div>
                        </div>

                        <div class="alert alert-info small py-2 mb-3">
                            등록된 <strong>일정</strong>과 <strong>업무일지</strong> 데이터를 기반으로 Gemini AI가 자동으로 보고서를 생성합니다.
                            데이터가 많을수록 더 정확한 보고서가 생성됩니다.
                        </div>

                        <!-- Gemini 처리 흐름 -->
                        <div class="p-3 rounded mb-3" style="background:#f9f4ff; border:1px solid #ddd6fe;">
                            <div class="fw-bold small mb-2" style="color:var(--gemini);">AI 보고서 생성 흐름</div>
                            <div class="d-flex align-items-center gap-2 mb-1 small text-muted">
                                <span class="badge rounded-pill text-white" style="background:var(--gemini);">1</span>
                                일정 + 업무일지 데이터 수집
                            </div>
                            <div class="d-flex align-items-center gap-2 mb-1 small text-muted">
                                <span class="badge rounded-pill text-white" style="background:var(--gemini);">2</span>
                                Gemini API에 보고서 생성 요청
                            </div>
                            <div class="d-flex align-items-center gap-2 small text-muted">
                                <span class="badge rounded-pill text-white" style="background:var(--gemini);">3</span>
                                요약, 통계, 권고사항 포함 보고서 생성
                            </div>
                        </div>

                        <button type="submit" class="btn btn-gemini text-white fw-bold w-100 py-2">
                            AI 보고서 생성
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // 보고서 종류에 따라 기간 자동 설정 + 직접입력 시 제목 input 토글
    function updateDateRange() {
        const type = document.getElementById('reportType').value;
        const today = new Date();
        const endDate = today.toISOString().split('T')[0];
        let startDate;

        if (type === 'weekly') {
            const weekAgo = new Date(today);
            weekAgo.setDate(today.getDate() - 6);
            startDate = weekAgo.toISOString().split('T')[0];
        } else if (type === 'monthly') {
            const monthAgo = new Date(today.getFullYear(), today.getMonth(), 1);
            startDate = monthAgo.toISOString().split('T')[0];
        } else if (type === 'direct') {
            // 직접입력은 기본 이번 달 기간으로 시작 (사용자가 자유 조정)
            const monthAgo = new Date(today.getFullYear(), today.getMonth(), 1);
            startDate = monthAgo.toISOString().split('T')[0];
        } else {
            // handover (인수인계) — 최근 3개월
            const threeMonthsAgo = new Date(today);
            threeMonthsAgo.setMonth(today.getMonth() - 3);
            startDate = threeMonthsAgo.toISOString().split('T')[0];
        }

        document.getElementById('startDate').value = startDate;
        document.getElementById('endDate').value = endDate;

        // 직접입력 종류일 때만 제목 input 표시 + required 강제
        const customTitleRow = document.getElementById('customTitleRow');
        const customTitleInput = document.getElementById('customTitle');
        if (type === 'direct') {
            customTitleRow.style.display = '';
            customTitleInput.required = true;
        } else {
            customTitleRow.style.display = 'none';
            customTitleInput.required = false;
            customTitleInput.value = '';
        }
    }

    // 빠른 기간 선택 — 시작/종료일 input 에 일괄 입력
    function setQuickRange(preset) {
        const today = new Date();
        const todayStr = toIsoDate(today);
        let start, end;

        if (preset === 'thisWeek') {
            // 이번 주 (월요일 ~ 일요일)
            const day = today.getDay();                  // 0(일) ~ 6(토)
            const diffToMonday = (day === 0 ? -6 : 1 - day);
            const monday = new Date(today);
            monday.setDate(today.getDate() + diffToMonday);
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            start = toIsoDate(monday);
            end = toIsoDate(sunday);
        } else if (preset === 'thisMonth') {
            // 이번 달 1일 ~ 말일
            start = toIsoDate(new Date(today.getFullYear(), today.getMonth(), 1));
            end   = toIsoDate(new Date(today.getFullYear(), today.getMonth() + 1, 0));
        } else if (preset === 'lastMonth') {
            // 지난 달 1일 ~ 말일
            start = toIsoDate(new Date(today.getFullYear(), today.getMonth() - 1, 1));
            end   = toIsoDate(new Date(today.getFullYear(), today.getMonth(), 0));
        } else if (preset === 'last7') {
            const d = new Date(today); d.setDate(today.getDate() - 6);
            start = toIsoDate(d); end = todayStr;
        } else if (preset === 'last30') {
            const d = new Date(today); d.setDate(today.getDate() - 29);
            start = toIsoDate(d); end = todayStr;
        }

        document.getElementById('startDate').value = start;
        document.getElementById('endDate').value = end;
    }

    // Date → YYYY-MM-DD (로컬 타임존 기준 — toISOString 의 UTC 변환 오차 방지)
    function toIsoDate(d) {
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return yyyy + '-' + mm + '-' + dd;
    }

    // 페이지 로드 시 기본 기간 설정
    updateDateRange();
</script>
</body>
</html>
