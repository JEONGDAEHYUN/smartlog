<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보고서 미리보기 - SmartLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<nav th:replace="~{fragments/topbar :: topbar}"></nav>

<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar('report-create')}"></div>

    <div class="flex-grow-1" style="min-height: calc(100vh - 42px); background: #f4f6f8;">
        <div class="bg-white border-bottom px-4 py-2 small text-muted">
            <span>홈</span> <span class="mx-1">▶</span>
            <span>지능형 리포트</span> <span class="mx-1">▶</span>
            <span>보고서 생성</span> <span class="mx-1">▶</span>
            <span class="fw-bold" style="color:var(--n6);">미리보기</span>
        </div>

        <div class="p-4">

            <!-- 안내 배너 — 아직 저장되지 않았음을 명확히 -->
            <div class="alert alert-warning d-flex align-items-center justify-content-between mb-3">
                <div>
                    <strong>⚠ 아직 저장되지 않았습니다.</strong>
                    내용을 확인하신 후 <strong>"보관함에 저장"</strong> 버튼을 눌러 보관함에 저장하세요.
                </div>
            </div>

            <!-- 보고서 헤더 -->
            <div class="d-flex align-items-center justify-content-between mb-3">
                <div>
                    <h5 class="fw-bold mb-1" th:text="${preview.repTitle}">보고서 제목</h5>
                    <div class="text-muted small">
                        <span class="badge" style="background:#fff4e5; color:#b7770d;">미리보기 모드</span>
                        <span class="ms-2 badge" style="background:#f3e8ff; color:#7c3aed;">Gemini AI 생성</span>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <!-- 다시 생성 — 미리보기 폐기 후 생성 페이지로 -->
                    <form th:action="@{/report/discard}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-secondary btn-sm">다시 생성</button>
                    </form>
                    <!-- 저장 — REPORT_INFO 에 INSERT 후 상세 페이지로 -->
                    <form th:action="@{/report/save}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm text-white fw-bold" style="background:#1a7a4a;">
                            ✓ 보관함에 저장
                        </button>
                    </form>
                </div>
            </div>

            <!-- 보고서 본문 — 카드 UI 렌더링 (detail 과 동일한 렌더러 사용) -->
            <div class="card border" style="background:#fafbfc;">
                <div class="card-body p-4">
                    <div id="reportRaw" style="display:none;" th:text="${preview.repCont}">보고서 내용</div>
                    <div id="reportRendered"></div>
                </div>
            </div>

            <!-- 하단 액션 (스크롤 하단에서도 저장 가능) -->
            <div class="d-flex justify-content-end gap-2 mt-3">
                <form th:action="@{/report/discard}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-secondary">다시 생성</button>
                </form>
                <form th:action="@{/report/save}" method="post" class="d-inline">
                    <button type="submit" class="btn text-white fw-bold px-4" style="background:#1a7a4a;">
                        ✓ 보관함에 저장
                    </button>
                </form>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/ai-content-renderer.js}"></script>
<script>
    // 미리보기 본문을 카드 UI 로 렌더링
    (function () {
        var raw = document.getElementById('reportRaw');
        if (raw) SmartLogAi.renderTo('reportRendered', raw.textContent);
    })();
</script>
</body>
</html>
