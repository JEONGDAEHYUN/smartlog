<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문서 보관함 - SmartLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<nav th:replace="~{fragments/topbar :: topbar}"></nav>

<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar('report-archive')}"></div>

    <div class="flex-grow-1" style="min-height: calc(100vh - 42px); background: #f4f6f8;">
        <div class="bg-white border-bottom px-4 py-2 small text-muted">
            <span>홈</span> <span class="mx-1">▶</span>
            <span>지능형 리포트</span> <span class="mx-1">▶</span>
            <span class="fw-bold" style="color:var(--n6);">문서 보관함</span>
        </div>

        <div class="p-4">
            <div class="d-flex align-items-center justify-content-between mb-3">
                <div class="d-flex align-items-center gap-2">
                    <div class="sec-bar"></div>
                    <span class="fw-bold small">보고서 목록</span>
                    <span class="badge bg-secondary-subtle text-secondary small ms-2"
                          id="reportCount"
                          th:text="${#lists.size(reports)} + '건'">0건</span>
                    <span class="badge bg-info-subtle text-info small ms-1" id="selectedCount" style="display:none;">선택 0건</span>
                </div>
                <div class="d-flex gap-2">
                    <!-- 선택 삭제 버튼 — 체크박스 선택 시 활성화 -->
                    <button type="button" class="btn btn-sm btn-outline-danger" id="deleteSelectedBtn"
                            onclick="deleteSelectedReports()" disabled>선택 삭제</button>
                    <a th:href="@{/report/create}" class="btn btn-sm text-white" style="background:var(--n6);">새 보고서 생성</a>
                </div>
            </div>

            <!-- 다중 삭제용 hidden form (체크된 repId 들을 모아 POST) -->
            <form id="multiDeleteForm" th:action="@{/report/delete-multiple}" method="post" style="display:none;"></form>

            <!-- 검색 / 기간 필터 (클라이언트 사이드 필터링) -->
            <div class="card border mb-3">
                <div class="card-body p-3 d-flex flex-wrap gap-2 align-items-end">
                    <div class="flex-grow-1" style="min-width:180px;">
                        <label class="form-label small text-muted mb-1">제목 검색</label>
                        <input type="text" class="form-control form-control-sm"
                               placeholder="보고서 제목으로 검색..." id="reportSearchInput">
                    </div>
                    <div>
                        <label class="form-label small text-muted mb-1">생성일 시작</label>
                        <input type="date" class="form-control form-control-sm" id="reportStartDate">
                    </div>
                    <div>
                        <label class="form-label small text-muted mb-1">생성일 종료</label>
                        <input type="date" class="form-control form-control-sm" id="reportEndDate">
                    </div>
                    <button type="button" class="btn btn-sm btn-outline-secondary"
                            onclick="resetReportFilter()">초기화</button>
                </div>
            </div>

            <div class="card border">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 small">
                        <thead class="table-light">
                            <tr>
                                <th style="width:38px;">
                                    <!-- 전체 선택 체크박스 -->
                                    <input type="checkbox" id="checkAllReports" onchange="toggleAllReports()">
                                </th>
                                <th>보고서 제목</th>
                                <th>내용 (요약)</th>
                                <th>생성일</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody id="reportTbody">
                            <tr th:if="${#lists.isEmpty(reports)}">
                                <td colspan="5" class="text-center text-muted py-4">생성된 보고서가 없습니다.</td>
                            </tr>
                            <tr th:each="rep : ${reports}" class="report-row"
                                th:data-title="${rep.repTitle}"
                                th:data-regdt="${#temporals.format(rep.regDt, 'yyyy-MM-dd')}">
                                <td>
                                    <!-- 개별 선택 체크박스 -->
                                    <input type="checkbox" class="report-checkbox"
                                           th:value="${rep.repId}" onchange="updateSelectedCount()">
                                </td>
                                <td>
                                    <a th:href="@{/report/detail/{id}(id=${rep.repId})}"
                                       class="fw-semibold text-decoration-none" style="color:var(--n6);"
                                       th:text="${rep.repTitle}">제목</a>
                                </td>
                                <td class="text-muted" th:text="${#strings.abbreviate(rep.repCont, 60)}">내용</td>
                                <td class="text-muted" th:text="${#temporals.format(rep.regDt, 'MM/dd HH:mm')}">날짜</td>
                                <td>
                                    <div class="d-flex gap-1">
                                        <a th:href="@{/report/detail/{id}(id=${rep.repId})}"
                                           class="btn btn-sm py-0 px-2" style="font-size:11px; background:var(--n6); color:#fff;">보기</a>
                                        <form th:action="@{/report/delete/{id}(id=${rep.repId})}" method="post"
                                              onsubmit="return confirm('정말 삭제하시겠습니까?');">
                                            <button type="submit" class="btn btn-sm btn-outline-danger py-0 px-2"
                                                    style="font-size:11px;">삭제</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 페이지네이션 -->
            <nav class="d-flex justify-content-center mt-3">
                <ul class="pagination pagination-sm mb-0" id="reportPagination"></ul>
            </nav>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // 보고서 제목 검색 + 생성일 기간 필터 + 페이지네이션 (클라이언트 사이드, 페이지당 10개)
    const RP_PAGE_SIZE = 10;
    let rpPage = 1;
    const allReportRows = Array.from(document.querySelectorAll('.report-row'));
    const searchInput = document.getElementById('reportSearchInput');
    const startDateInput = document.getElementById('reportStartDate');
    const endDateInput = document.getElementById('reportEndDate');
    const countBadge = document.getElementById('reportCount');
    const rpPagination = document.getElementById('reportPagination');

    function getFilteredReports() {
        const keyword = (searchInput.value || '').trim().toLowerCase();
        const startDate = startDateInput.value || '';
        const endDate = endDateInput.value || '';
        return allReportRows.filter(row => {
            const title = (row.dataset.title || '').toLowerCase();
            const regDt = row.dataset.regdt || '';
            return (keyword === '' || title.includes(keyword))
                && (startDate === '' || regDt >= startDate)
                && (endDate === '' || regDt <= endDate);
        });
    }

    function renderReports() {
        const filtered = getFilteredReports();
        const totalPages = Math.max(1, Math.ceil(filtered.length / RP_PAGE_SIZE));
        if (rpPage > totalPages) rpPage = totalPages;

        allReportRows.forEach(r => r.style.display = 'none');
        const start = (rpPage - 1) * RP_PAGE_SIZE;
        filtered.slice(start, start + RP_PAGE_SIZE).forEach(r => r.style.display = '');

        if (countBadge) countBadge.textContent = filtered.length + '건';

        let html = '';
        html += '<li class="page-item ' + (rpPage === 1 ? 'disabled' : '') + '"><a class="page-link" href="#" data-page="' + (rpPage - 1) + '">이전</a></li>';
        for (let i = 1; i <= totalPages; i++) {
            html += '<li class="page-item ' + (i === rpPage ? 'active' : '') + '"><a class="page-link" href="#" data-page="' + i + '">' + i + '</a></li>';
        }
        html += '<li class="page-item ' + (rpPage === totalPages ? 'disabled' : '') + '"><a class="page-link" href="#" data-page="' + (rpPage + 1) + '">다음</a></li>';
        rpPagination.innerHTML = html;

        rpPagination.querySelectorAll('a.page-link').forEach(a => {
            a.addEventListener('click', (e) => {
                e.preventDefault();
                const p = parseInt(a.dataset.page);
                if (p >= 1 && p <= totalPages) { rpPage = p; renderReports(); }
            });
        });
    }

    function resetReportFilter() {
        searchInput.value = '';
        startDateInput.value = '';
        endDateInput.value = '';
        rpPage = 1;
        renderReports();
    }

    if (searchInput) searchInput.addEventListener('keyup', () => { rpPage = 1; renderReports(); });
    if (startDateInput) startDateInput.addEventListener('change', () => { rpPage = 1; renderReports(); });
    if (endDateInput) endDateInput.addEventListener('change', () => { rpPage = 1; renderReports(); });
    renderReports();

    // ─────────────────────────────────────────────────────────
    // 체크박스 다중 선택 + 일괄 삭제
    // ─────────────────────────────────────────────────────────

    // 현재 화면에 보이는(필터/페이지 적용된) 체크박스만 대상으로 동작
    function getVisibleCheckboxes() {
        return Array.from(document.querySelectorAll('.report-row'))
            .filter(r => r.style.display !== 'none')
            .map(r => r.querySelector('.report-checkbox'))
            .filter(cb => cb !== null);
    }

    // 전체 선택 토글
    function toggleAllReports() {
        const checked = document.getElementById('checkAllReports').checked;
        getVisibleCheckboxes().forEach(cb => { cb.checked = checked; });
        updateSelectedCount();
    }

    // 선택 개수 → 뱃지/버튼 활성화 갱신
    function updateSelectedCount() {
        const selected = document.querySelectorAll('.report-checkbox:checked');
        const badge = document.getElementById('selectedCount');
        const btn = document.getElementById('deleteSelectedBtn');
        if (selected.length > 0) {
            badge.textContent = '선택 ' + selected.length + '건';
            badge.style.display = '';
            btn.disabled = false;
        } else {
            badge.style.display = 'none';
            btn.disabled = true;
        }
    }

    // 선택된 보고서 일괄 삭제 — hidden form 에 repIds 채워서 POST
    function deleteSelectedReports() {
        const selected = Array.from(document.querySelectorAll('.report-checkbox:checked'));
        if (selected.length === 0) return;
        if (!confirm(selected.length + '건의 보고서를 삭제하시겠습니까?')) return;

        const form = document.getElementById('multiDeleteForm');
        form.innerHTML = '';
        // CSRF 토큰 자동 삽입은 Thymeleaf 가 처리 — th:action 으로 만든 multiDeleteForm 에 이미 _csrf hidden 있음
        // 그대로 두고 repIds 만 추가
        selected.forEach(cb => {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'repIds';
            input.value = cb.value;
            form.appendChild(input);
        });
        form.submit();
    }
</script>
</body>
</html>
