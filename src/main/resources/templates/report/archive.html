<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문서 보관함 - SmartLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<nav th:replace="~{fragments/topbar :: topbar}"></nav>

<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar('report-archive')}"></div>

    <div class="flex-grow-1" style="min-height: calc(100vh - 42px); background: #f4f6f8;">
        <div class="bg-white border-bottom px-4 py-2 small text-muted">
            <span>홈</span> <span class="mx-1">▶</span>
            <span>지능형 리포트</span> <span class="mx-1">▶</span>
            <span class="fw-bold" style="color:var(--n6);">문서 보관함</span>
        </div>

        <div class="p-4">
            <div class="d-flex align-items-center justify-content-between mb-3">
                <div class="d-flex align-items-center gap-2">
                    <div class="sec-bar"></div>
                    <span class="fw-bold small">보고서 목록</span>
                    <span class="badge bg-secondary-subtle text-secondary small ms-2"
                          th:text="${#lists.size(reports)} + '건'">0건</span>
                </div>
                <a th:href="@{/report/create}" class="btn btn-sm text-white" style="background:var(--n6);">새 보고서 생성</a>
            </div>

            <div class="card border">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 small">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>보고서 제목</th>
                                <th>내용 (요약)</th>
                                <th>생성일</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(reports)}">
                                <td colspan="5" class="text-center text-muted py-4">생성된 보고서가 없습니다.</td>
                            </tr>
                            <tr th:each="rep : ${reports}">
                                <td><span class="badge bg-light text-muted" style="font-family:monospace;"
                                          th:text="'#' + ${rep.repId}">ID</span></td>
                                <td>
                                    <a th:href="@{/report/detail/{id}(id=${rep.repId})}"
                                       class="fw-semibold text-decoration-none" style="color:var(--n6);"
                                       th:text="${rep.repTitle}">제목</a>
                                </td>
                                <td class="text-muted" th:text="${#strings.abbreviate(rep.repCont, 60)}">내용</td>
                                <td class="text-muted" th:text="${#temporals.format(rep.regDt, 'MM/dd HH:mm')}">날짜</td>
                                <td>
                                    <div class="d-flex gap-1">
                                        <a th:href="@{/report/detail/{id}(id=${rep.repId})}"
                                           class="btn btn-sm py-0 px-2" style="font-size:11px; background:var(--n6); color:#fff;">보기</a>
                                        <form th:action="@{/report/delete/{id}(id=${rep.repId})}" method="post"
                                              onsubmit="return confirm('정말 삭제하시겠습니까?');">
                                            <button type="submit" class="btn btn-sm btn-outline-danger py-0 px-2"
                                                    style="font-size:11px;">삭제</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
