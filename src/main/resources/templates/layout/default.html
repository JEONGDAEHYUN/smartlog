<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - SmartLog'">SmartLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --n9: #0d1f35; --n8: #1a3a5c; --n7: #1e4a7a; --n6: #2d6ca8; --n4: #4a8fc4; --n2: #7ab0d4; }
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; font-size: 13px; }

        /* 사이드바 */
        .sidebar { width: 220px; background: var(--n7); min-height: 100vh; }
        .sidebar .nav-link { color: var(--n2); font-size: 13px; padding: 9px 16px; border-left: 3px solid transparent; }
        .sidebar .nav-link:hover { background: rgba(45,108,168,.25); color: #fff; }
        .sidebar .nav-link.active { background: var(--n6); color: #fff; border-left-color: var(--n4); }
        .sidebar .nav-label { font-size: 10px; color: var(--n4); padding: 10px 16px 4px; letter-spacing: .05em; text-transform: uppercase; }
        .sidebar .sb-badge { background: #c0392b; color: #fff; font-size: 9px; padding: 1px 6px; border-radius: 3px; }

        /* 탑바 */
        .topbar { background: var(--n9); height: 42px; }
        .topbar .tb-name { font-size: 14px; font-weight: 700; color: #e8f4ff; letter-spacing: .04em; }
        .topbar .tb-sub { font-size: 11px; color: var(--n4); }
        .tb-avatar { width: 28px; height: 28px; background: var(--n6); border-radius: 50%;
                     display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; }
    </style>
</head>
<body>

<!-- 탑바 -->
<nav class="topbar d-flex align-items-center justify-content-between px-3">
    <div class="d-flex align-items-center gap-2">
        <div style="width:24px;height:24px;background:var(--n6);border-radius:4px;display:flex;align-items:center;justify-content:center;">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="2.5" rx="1.2" fill="#7ab0d4"/><rect x="1" y="7" width="10" height="2.5" rx="1.2" fill="#7ab0d4"/><rect x="1" y="12" width="12" height="2.5" rx="1.2" fill="#7ab0d4"/></svg>
        </div>
        <span class="tb-name">Smart-Log Sync</span>
        <span class="tb-sub d-none d-md-inline">AI 기반 업무일지 관리 시스템</span>
    </div>
    <div class="d-flex align-items-center gap-3" sec:authorize="isAuthenticated()">
        <div class="d-flex align-items-center gap-2 text-white small">
            <div class="tb-avatar" sec:authentication="name" th:text="${#strings.substring(#authentication.name, 0, 1)}">U</div>
            <span sec:authentication="name">사용자</span>
        </div>
        <form th:action="@{/logout}" method="post" class="mb-0">
            <button type="submit" class="btn btn-sm text-white-50" style="font-size:11px;">로그아웃</button>
        </form>
    </div>
</nav>

<div class="d-flex">
    <!-- 사이드바 -->
    <div class="sidebar d-none d-lg-block">
        <div class="text-center py-3 border-bottom" style="border-color: #164070 !important;">
            <div class="text-white fw-bold small" sec:authentication="name">사용자</div>
            <div style="font-size:10px; color:var(--n4);">ROLE_USER</div>
        </div>
        <nav class="nav flex-column pt-2">
            <div class="nav-label">통합 관제</div>
            <a class="nav-link" th:classappend="${activeMenu == 'dashboard'} ? ' active'" th:href="@{/dashboard}">대시보드 메인</a>
            <a class="nav-link" th:classappend="${activeMenu == 'notifications'} ? ' active'" th:href="@{/notifications}">알림 센터 <span class="sb-badge ms-auto">3</span></a>

            <div class="nav-label">AI 업무일지</div>
            <a class="nav-link" th:classappend="${activeMenu == 'worklog-write'} ? ' active'" th:href="@{/worklog/write}">원본 메모 작성</a>
            <a class="nav-link" th:classappend="${activeMenu == 'worklog-archive'} ? ' active'" th:href="@{/worklog/archive}">업무 아카이브</a>

            <div class="nav-label">스마트 일정</div>
            <a class="nav-link" th:classappend="${activeMenu == 'schedule-monthly'} ? ' active'" th:href="@{/schedule/monthly}">월간 캘린더</a>
            <a class="nav-link" th:classappend="${activeMenu == 'schedule-weekly'} ? ' active'" th:href="@{/schedule/weekly}">주간/일간 계획표</a>

            <div class="nav-label">지능형 리포트</div>
            <a class="nav-link" th:classappend="${activeMenu == 'report-create'} ? ' active'" th:href="@{/report/create}">보고서 생성</a>
            <a class="nav-link" th:classappend="${activeMenu == 'report-archive'} ? ' active'" th:href="@{/report/archive}">문서 보관함</a>

            <div class="nav-label">설정</div>
            <a class="nav-link" th:classappend="${activeMenu == 'mypage'} ? ' active'" th:href="@{/mypage}">마이페이지</a>
        </nav>
    </div>

    <!-- 메인 콘텐츠 -->
    <div class="flex-grow-1" style="min-height: calc(100vh - 42px); background: #f4f6f8;">
        <!-- 브레드크럼 -->
        <div class="bg-white border-bottom px-4 py-2 small text-muted">
            <span>홈</span> <span class="mx-1">▶</span>
            <span th:text="${breadcrumb}">페이지</span> <span class="mx-1">▶</span>
            <span class="fw-bold" style="color:var(--n6);" th:text="${pageTitle}">제목</span>
        </div>

        <!-- 페이지 콘텐츠 (각 페이지에서 교체) -->
        <div class="p-4" th:replace="${content}">
            콘텐츠 영역
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
